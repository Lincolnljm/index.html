<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Multiplayer Shooter</title>
<style>
  body { margin: 0; background: #111; overflow: hidden; color: white; font-family: sans-serif;}
  #ui { position: absolute; top: 10px; left: 10px; }
</style>
</head>
<body>

<canvas id="game"></canvas>
<div id="ui"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const ui = document.getElementById("ui");

const keys = {};

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// Player setup
function createPlayer(x, y, color, controls) {
  return {
    x, y,
    size: 30,
    speed: 4,
    color,
    health: 100,
    score: 0,
    cooldown: 0,
    controls
  };
}

const player1 = createPlayer(100, 100, "cyan", {
  up: "w", down: "s", left: "a", right: "d", shoot: " "
});

const player2 = createPlayer(canvas.width - 100, canvas.height - 100, "red", {
  up: "arrowup", down: "arrowdown", left: "arrowleft", right: "arrowright", shoot: "enter"
});

const bullets = [];

// Shooting
function shoot(player, target) {
  const angle = Math.atan2(target.y - player.y, target.x - player.x);
  bullets.push({
    x: player.x,
    y: player.y,
    vx: Math.cos(angle) * 7,
    vy: Math.sin(angle) * 7,
    owner: player
  });
}

// Movement
function movePlayer(p) {
  if (keys[p.controls.up]) p.y -= p.speed;
  if (keys[p.controls.down]) p.y += p.speed;
  if (keys[p.controls.left]) p.x -= p.speed;
  if (keys[p.controls.right]) p.x += p.speed;

  // Clamp to screen
  p.x = Math.max(0, Math.min(canvas.width, p.x));
  p.y = Math.max(0, Math.min(canvas.height, p.y));
}

// Game loop
function update() {
  movePlayer(player1);
  movePlayer(player2);

  // Shooting logic
  if (keys[player1.controls.shoot] && player1.cooldown <= 0) {
    shoot(player1, player2);
    player1.cooldown = 15;
  }

  if (keys[player2.controls.shoot] && player2.cooldown <= 0) {
    shoot(player2, player1);
    player2.cooldown = 15;
  }

  player1.cooldown--;
  player2.cooldown--;

  // Update bullets
  bullets.forEach((b, i) => {
    b.x += b.vx;
    b.y += b.vy;

    // Collision
    [player1, player2].forEach(p => {
      if (p !== b.owner) {
        const dx = p.x - b.x;
        const dy = p.y - b.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < p.size) {
          p.health -= 10;
          bullets.splice(i, 1);
        }
      }
    });

    // Remove offscreen
    if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
      bullets.splice(i, 1);
    }
  });

  // Respawn
  [player1, player2].forEach(p => {
    if (p.health <= 0) {
      if (p === player1) player2.score++;
      else player1.score++;

      p.x = Math.random() * canvas.width;
      p.y = Math.random() * canvas.height;
      p.health = 100;
    }
  });
}

// Draw
function draw() {
  ctx.fillStyle = "#111";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Players
  ctx.font = "30px Arial";
  ctx.fillText("🔵", player1.x - 15, player1.y + 10);
  ctx.fillText("🔴", player2.x - 15, player2.y + 10);

  // Bullets
  ctx.fillStyle = "yellow";
  bullets.forEach(b => {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
    ctx.fill();
  });

  // UI
  ui.innerHTML = `
    🔵 Player 1: ${player1.score} | Health: ${player1.health}
    <br>
    🔴 Player 2: ${player2.score} | Health: ${player2.health}
  `;
}

// Loop
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
