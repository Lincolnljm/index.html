<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🚀 Space Survival</title>
<style>
    body {
        margin: 0;
        background: black;
        color: white;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }
    #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        font-size: 18px;
    }
    canvas {
        display: block;
    }
</style>
</head>
<body>

<div id="ui">
    Score: <span id="score">0</span><br>
    High Score: <span id="highScore">0</span>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let keys = {};
let gameOver = false;
let score = 0;
let highScore = localStorage.getItem("spaceHighScore") || 0;

document.getElementById("highScore").textContent = highScore;

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

const player = {
    x: canvas.width / 2,
    y: canvas.height - 100,
    size: 30,
    speed: 6
};

let asteroids = [];
let spawnRate = 60;
let frame = 0;

function spawnAsteroid() {
    asteroids.push({
        x: Math.random() * canvas.width,
        y: -20,
        size: 20 + Math.random() * 20,
        speed: 2 + Math.random() * 3 + score / 500
    });
}

function update() {
    if (gameOver) return;

    // Movement
    if (keys["ArrowLeft"]) player.x -= player.speed;
    if (keys["ArrowRight"]) player.x += player.speed;
    if (keys["ArrowUp"]) player.y -= player.speed;
    if (keys["ArrowDown"]) player.y += player.speed;

    // Boundaries
    player.x = Math.max(0, Math.min(canvas.width, player.x));
    player.y = Math.max(0, Math.min(canvas.height, player.y));

    // Spawn asteroids
    frame++;
    if (frame % spawnRate === 0) {
        spawnAsteroid();
        if (spawnRate > 20) spawnRate--;
    }

    // Move asteroids
    asteroids.forEach(a => a.y += a.speed);

    // Collision detection
    asteroids.forEach(a => {
        let dx = player.x - a.x;
        let dy = player.y - a.y;
        let dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < player.size) {
            gameOver = true;
            if (score > highScore) {
                localStorage.setItem("spaceHighScore", score);
            }
        }
    });

    // Remove off-screen asteroids
    asteroids = asteroids.filter(a => a.y < canvas.height + 50);

    // Score
    score++;
    document.getElementById("score").textContent = score;
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Player 🚀
    ctx.font = "30px Arial";
    ctx.fillText("🚀", player.x - 15, player.y + 10);

    // Asteroids ☄️
    ctx.font = "25px Arial";
    asteroids.forEach(a => {
        ctx.fillText("☄️", a.x - 10, a.y);
    });

    if (gameOver) {
        ctx.fillStyle = "white";
        ctx.font = "40px Arial";
        ctx.fillText("GAME OVER", canvas.width / 2 - 120, canvas.height / 2);
        ctx.font = "20px Arial";
        ctx.fillText("Refresh to restart", canvas.width / 2 - 90, canvas.height / 2 + 40);
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
